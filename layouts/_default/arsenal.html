{{ define "main" }}
<article>
  <header class="mb-8 bg-primary-600 py-12 text-center">
    <h1 class="text-5xl font-black text-white">{{ .Title }}</h1>
    {{ with .Description }}
    <p class="mt-3 text-primary-100 text-lg">{{ . }}</p>
    {{ end }}
  </header>

  <div class="mx-auto max-w-5xl px-6 pb-16"
    x-data="{
      search: '',
      weapon: 'all',
      weightClass: 'all',
      robots: {{ .Params.robots | jsonify }},
      get filtered() {
        return this.robots.filter(r => {
          const matchSearch = this.search === '' ||
            r.name.toLowerCase().includes(this.search.toLowerCase()) ||
            (r.weapon || '').toLowerCase().includes(this.search.toLowerCase());
          const matchWeapon = this.weapon === 'all' || r.weapon === this.weapon;
          const matchClass = this.weightClass === 'all' || r.class === this.weightClass;
          return matchSearch && matchWeapon && matchClass;
        });
      },
      get weaponTypes() {
        const types = [...new Set(this.robots.map(r => r.weapon).filter(Boolean))];
        return types;
      },
      get weightClasses() {
        return [...new Set(this.robots.map(r => r.class).filter(Boolean))];
      },
      reset() { this.search = ''; this.weapon = 'all'; this.weightClass = 'all'; }
    }">

    <!-- Search + Weapon filter -->
    <div style="display:flex;flex-wrap:wrap;gap:0.75rem;align-items:center;justify-content:center;margin-bottom:1rem;">
      <div style="position:relative;">
        <input x-model="search" type="text" placeholder="Search robots by name or weapon..."
          style="width:22rem;padding:0.625rem 2.5rem 0.625rem 1rem;border-radius:9999px;border:1px solid #374151;background:#1f2937;color:white;font-size:0.9rem;outline:none;">
        <svg style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);color:#6b7280;width:1rem;height:1rem;" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
        </svg>
      </div>
      <select x-model="weapon"
        style="padding:0.625rem 1rem;border-radius:9999px;border:1px solid #374151;background:#1f2937;color:white;font-size:0.9rem;outline:none;cursor:pointer;">
        <option value="all">All Weapons</option>
        <template x-for="w in weaponTypes" :key="w">
          <option :value="w" x-text="w"></option>
        </template>
      </select>
      <button @click="reset()"
        style="padding:0.625rem 1.25rem;border-radius:9999px;border:1px solid #374151;background:#1f2937;color:white;font-size:0.9rem;cursor:pointer;">
        Reset
      </button>
    </div>

    <!-- Weight class buttons -->
    <div style="display:flex;flex-wrap:wrap;gap:0.5rem;justify-content:center;margin-bottom:2rem;">
      <button @click="weightClass = 'all'"
        style="padding:0.625rem 1.25rem;border-radius:9999px;border:1px solid #374151;background:#1f2937;color:white;font-size:0.9rem;cursor:pointer;">
        All Bots
      </button>
      <template x-for="wc in weightClasses" :key="wc">
        <button @click="weightClass = wc"
          style="padding:0.625rem 1.25rem;border-radius:9999px;border:1px solid #374151;background:#1f2937;color:white;font-size:0.9rem;cursor:pointer;"
          x-text="wc + ' Class'">
        </button>
      </template>
    </div>

    <!-- Robot cards grid -->
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1.25rem;">
      <template x-for="robot in filtered" :key="robot.name">
        <div style="background:#111827;border-radius:0.75rem;overflow:hidden;display:flex;flex-direction:column;">
          <!-- Image -->
          <div style="aspect-ratio:4/3;background:#374151;display:flex;align-items:center;justify-content:center;position:relative;">
            <template x-if="robot.image">
              <img :src="robot.image" :alt="robot.name" style="width:100%;height:100%;object-fit:cover;" />
            </template>
            <template x-if="!robot.image">
              <svg style="width:4rem;height:4rem;color:#6b7280;" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
              </svg>
            </template>
          </div>
          <!-- Card body -->
          <div style="padding:1rem;flex:1;display:flex;flex-direction:column;gap:0.5rem;">
            <!-- Class badge -->
            <span x-text="robot.class"
              style="display:inline-block;background:#6d57e8;color:white;font-size:0.7rem;font-weight:700;padding:0.15rem 0.5rem;border-radius:9999px;width:fit-content;"></span>
            <h3 x-text="robot.name" style="color:white;font-size:1rem;font-weight:700;margin:0;"></h3>
            <p x-text="robot.description" style="color:#9ca3af;font-size:0.8rem;line-height:1.4;flex:1;margin:0;"></p>
            <!-- Links -->
            <div style="display:flex;gap:1rem;margin-top:0.5rem;">
              <template x-if="robot.details">
                <a :href="robot.details" style="color:#818cf8;font-size:0.8rem;text-decoration:none;">View Details</a>
              </template>
              <template x-if="!robot.details">
                <span style="color:#4b5563;font-size:0.8rem;">View Details</span>
              </template>
              <template x-if="robot.github">
                <a :href="robot.github" style="color:#818cf8;font-size:0.8rem;text-decoration:none;">GitHub</a>
              </template>
              <template x-if="!robot.github">
                <span style="color:#4b5563;font-size:0.8rem;">GitHub</span>
              </template>
            </div>
          </div>
        </div>
      </template>
      <!-- Empty state -->
      <template x-if="filtered.length === 0">
        <div style="grid-column:1/-1;text-align:center;padding:3rem;color:#6b7280;">No robots match your search.</div>
      </template>
    </div>

  </div>
</article>
{{ end }}
