{{ define "main" }}
  <article>
    <header class="mb-8 bg-primary-600 py-12 text-center">
      <h1 class="text-5xl font-black text-white">{{ .Title }}</h1>
      {{ with .Description }}
        <p class="mt-3 text-primary-100 text-lg">{{ . }}</p>
      {{ end }}
    </header>

    <div class="max-w-screen-lg mx-auto px-4 prose prose-lg max-w-none pb-12">
        {{ .Content }}
    </div>

  </article>
{{ end }}
