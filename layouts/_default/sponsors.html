{{ define "main" }}
<article>
  <header class="mb-8 bg-primary-600 py-12 text-center">
    <h1 class="text-5xl font-black text-white">{{ .Title }}</h1>
    {{ with .Description }}
    <p class="mt-3 text-primary-100 text-lg">{{ . }}</p>
    {{ end }}
  </header>

  <div style="max-width:800px;margin:4rem auto;padding:0 2rem;text-align:center;">
    <p style="color:#6b7280;font-size:1.125rem;">Sponsor information coming soon.</p>
    <p style="color:#6b7280;font-size:1rem;margin-top:1rem;">Interested in sponsoring TMU BattleBots? <a href="/{{ $.Site.LanguagePrefix }}contact/" style="color:#818cf8;">Contact us.</a></p>
  </div>
</article>
{{ end }}
