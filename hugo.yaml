baseURL: 'https://TMU-BattleBots.github.io/TMU-Battlebots-Updated-Site/'
title: TMU BattleBots
languageCode: en-us
theme: tailbliss
DefaultContentLanguage: en
enableEmoji: true
enableGitInfo: false
enableRobotsTXT: true
canonifyURLs: false
pagination:
  pagerSize: 9
darkmode_js:
  - assets/js/darkmode.js
enableInlineShortcodes: true

markup:
  goldmark:
    extensions:
      definitionList: true
      footnote: true
      linkify: true
      linkifyProtocol: https
      strikethrough: true
      table: true
      taskList: true
      typographer:
        apostrophe: '&rsquo;'
        disable: false
        ellipsis: '&hellip;'
        emDash: '&mdash;'
        enDash: '&ndash;'
        leftAngleQuote: '&laquo;'
        leftDoubleQuote: '&ldquo;'
        leftSingleQuote: '&lsquo;'
        rightAngleQuote: '&raquo;'
        rightDoubleQuote: '&rdquo;'
        rightSingleQuote: '&rsquo;'
    parser:
      attribute:
        block: false
        title: true
      autoHeadingID: true
      autoHeadingIDType: github
      wrapStandAloneImageWithinParagraph: true
    renderer:
      hardWraps: false
      unsafe: true
      xhtml: false

params:
  author: Amyn Jiwani & Software Team
  authorimage: ../assets/images/global/logo.png
  og_image: /images/battlebots-cover.png
  moto: "Building Tomorrow's Combat Champions"
  description: "TMU BattleBots"
  disable_theme_toggle: false
  disable_stay_uptodate: true

  p1:
    heading: "Our Mission"
    image: "images/pages/our-mission.png"
    content:
      - text: "TMU BattleBots is a student-run club focused on designing, building, and competing with combat robots across different weight classes. Based at Toronto Metropolitan University, our team brings together students passionate about engineering, robotics, and competitive design."
      - text: "We foster a collaborative and innovative environment where students can develop their skills and bring ideas to life. Our team works on everything from mechanical design and electronics to programming and combat strategy."
      - text: "Led by captains Ammar & Palak, our diverse team includes members specializing in mechanical design, electronics, programming, and combat strategy. We work collaboratively to push the boundaries of robotics, developing innovative solutions for weapon systems, drive mechanisms, and control systems."
  p3:
    heading: "Backed by our sponsors"
    content:
      - text: "We are grateful for the support of our sponsors and partners who help make TMU BattleBots possible."
    links:
      - text: Meet our sponsors and supporters
        url: /sponsors/
    logos:
      - identifier: a
      - identifier: b
      - identifier: c
      - identifier: d
      - identifier: e
      - identifier: f
  p2:
    heading: "Stay Up to Date"
    content:
      - text: "Enter your email to stay up-to-date with the latest news and updates about our team!"
    action: "https://formspree.io/f/xbdpgrpr"
    label: "Email address"
    placeholder: "Enter your email"
    button: "Notify me"

  social_media:
    github:
      enabled: true
      url: 'https://github.com/TMU-BattleBots'
    facebook:
      enabled: false
      url: ''
    instagram:
      enabled: true
      url: 'https://www.instagram.com/tmubattlebots/'
    twitter:
      enabled: false
      url: ''
    

